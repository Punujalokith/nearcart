name: nearcart
description: NearCart — Hyperlocal Marketplace for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.3

  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0

  # Payments
  flutter_stripe: ^10.1.1

  # Maps (OpenStreetMap — free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Real-time
  socket_io_client: ^2.0.3+1

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0

  # UI helpers
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
